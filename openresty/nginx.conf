env DOMAIN_SUFFIX;
env CONSUL_ADDR;
env CONSUL_TOKEN;
env POLL_INTERVAL;
env FILTER_TAGS;

worker_processes auto;
error_log /dev/stderr notice;
pid       /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    lua_shared_dict routes 1m;
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;;";

    resolver 127.0.0.53 ipv6=off valid=10s;

    access_log /dev/stdout;

    # WebSocket support: pass Upgrade/Connection when client requests upgrade,
    # otherwise keep empty Connection for HTTP/1.1 keepalive
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    init_worker_by_lua_block {
        require("discovery").start()
    }

    server {
        listen 80;
        server_name _;

        location / {
            set $target '';

            access_by_lua_block {
                require("discovery").route()
            }

            proxy_http_version 1.1;
            proxy_pass http://$target;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_connect_timeout 5s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}
